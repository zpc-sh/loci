[loci-native]
image=quay.io/fedora/fedora:41
pull=true
nvidia=false
root=false
replace=true
home=$HOME
init_hooks=dnf -y install git curl which findutils gcc gcc-c++ make patch python3 jq unzip tar gzip shadow-utils glibc-devel glibc-static libstdc++-devel why3 z3 cvc5 && dnf clean all
start_now=false
pre_init_hooks=useradd -m -u $(id -u) -g $(id -g) loci || true
entry=false
additional_packages=
